<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 레시피 노트</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .drag-over { border: 2px dashed #f97316 !important; background-color: #fff7ed !important; }
        .spinner { width: 30px; height: 30px; border: 3px solid rgba(249, 115, 22, 0.1); border-top: 3px solid #f97316; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .modal-overlay { background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        textarea:focus { outline: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 구글 앱스 스크립트 웹 앱 주소
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyjIxQcDAcLHuH9auRs4bLN--l9KJ5PvFx6uVuYwguyll8fbKW7G5HUSsQvG8rYWAsA0A/exec";
        const DEFAULT_CATEGORIES = ["찌개&국", "기타 한식", "면", "소스", "디저트"];

        // Lucide 아이콘 에러 방지용 안전 컴포넌트
        const Icon = ({ name, className = "w-5 h-5" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons({ root: iconRef.current });
                }
            }, [name]);
            return <span ref={iconRef} className="inline-flex items-center"><i data-lucide={name} className={className}></i></span>;
        };

        const App = () => {
            const [view, setView] = useState('main'); 
            const [recipes, setRecipes] = useState([]);
            const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
            const [searchQuery, setSearchQuery] = useState("");
            const [activeCategory, setActiveCategory] = useState("전체");
            const [selectedRecipe, setSelectedRecipe] = useState(null);
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [isLoading, setIsLoading] = useState(true);

            // 냉장고 & 장보기 상태 (v4.1 호환)
            const [fridgeData, setFridgeData] = useState({ refrigerated: "", frozen: "", roomTemp: "", sauce: "", shoppingMemo: "" });
            const [isFridgeSaving, setIsFridgeSaving] = useState(false);
            const [editingSection, setEditingSection] = useState(null);

            // AI 추천 상태
            const [aiInput, setAiInput] = useState("");
            const [aiRecommendations, setAiRecommendations] = useState([]); 
            const [selectedAiRecipe, setSelectedAiRecipe] = useState(null); 
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [errorMsg, setErrorMsg] = useState("");
            const [draggedItemIndex, setDraggedItemIndex] = useState(null);

            const [formData, setFormData] = useState({ title: "", category: "", ingredients: "", sauce: "", steps: "" });
            const [newCatName, setNewCatName] = useState("");

            useEffect(() => { fetchData(); }, []);

            const fetchData = async () => {
                try {
                    const response = await fetch(SCRIPT_URL);
                    const data = await response.json();
                    if (data.recipes) setRecipes(data.recipes);
                    if (data.categories && data.categories.length > 0) setCategories(data.categories);
                    if (data.fridgeData) setFridgeData(data.fridgeData);
                } catch (err) { console.error("데이터 로드 중 오류 발생:", err); }
                finally { setIsLoading(false); }
            };

            const saveData = async (updatedRecipes, updatedCategories) => {
                try {
                    await fetch(SCRIPT_URL, {
                        method: "POST",
                        mode: "no-cors",
                        body: JSON.stringify({ type: "save", recipes: updatedRecipes || recipes, categories: updatedCategories || categories })
                    });
                } catch (err) { console.error("저장 오류:", err); }
            };

            // 냉장고 및 장보기 메모 통합 저장 (v4.1 로직)
            const saveFridgeAndMemo = async (newData = null) => {
                const finalData = newData || fridgeData;
                setIsFridgeSaving(true);
                try {
                    await fetch(SCRIPT_URL, {
                        method: "POST",
                        mode: "no-cors",
                        body: JSON.stringify({ type: "saveFridge", fridgeData: finalData })
                    });
                } catch (err) { console.error("냉장고 저장 오류:", err); }
                finally { setIsFridgeSaving(false); }
            };

            const loadFridgeToAi = () => {
                const allIngredients = [fridgeData.refrigerated, fridgeData.frozen, fridgeData.roomTemp, fridgeData.sauce].filter(t => t && t.trim() !== "").join(", ");
                if (!allIngredients) { alert("냉장고가 비어있습니다."); return; }
                setAiInput(allIngredients);
            };

            const askAiRecipe = async () => {
                if (!aiInput.trim()) return;
                setIsAiLoading(true);
                setAiRecommendations([]);
                setSelectedAiRecipe(null);
                setErrorMsg("");
                const prompt = `가진 재료: ${aiInput}. 3가지 요리를 JSON 형식으로 추천해줘. JSON 코드 블록으로만 응답해. [{"title": "이름", "ingredients": ["재료"], "sauce": ["양념"], "steps": ["단계"]}]`;
                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ type: "analyze", prompt: prompt })
                    });
                    const result = await response.json();
                    const rawText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    const jsonMatch = rawText.match(/\[[\s\S]*\]/);
                    if (jsonMatch) setAiRecommendations(JSON.parse(jsonMatch[0]));
                    else throw new Error();
                } catch (err) { setErrorMsg("추천 내용을 가져오지 못했습니다."); }
                finally { setIsAiLoading(false); }
            };

            const filteredRecipes = recipes.filter(r => {
                const matchCat = activeCategory === "전체" || r.category === activeCategory;
                const matchSearch = r.title.toLowerCase().includes(searchQuery.toLowerCase()) || r.ingredients.join(' ').toLowerCase().includes(searchQuery.toLowerCase());
                return matchCat && matchSearch;
            });

            const handleOpenAdd = () => {
                setEditingId(null);
                setFormData({ title: "", category: "", ingredients: "", sauce: "", steps: "" });
                setIsFormOpen(true);
            };

            const handleOpenEdit = (recipe, e) => {
                if (e) e.stopPropagation();
                setEditingId(recipe.id);
                setFormData({ title: recipe.title, category: recipe.category, ingredients: recipe.ingredients.join('\n'), sauce: (recipe.sauce || []).join('\n'), steps: recipe.steps.join('\n') });
                setIsFormOpen(true);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                const recipeData = { id: editingId || Date.now(), title: formData.title, category: formData.category, ingredients: formData.ingredients.split('\n').filter(v => v.trim()), sauce: formData.sauce.split('\n').filter(v => v.trim()), steps: formData.steps.split('\n').filter(v => v.trim()) };
                const updated = editingId ? recipes.map(r => r.id === editingId ? recipeData : r) : [...recipes, recipeData];
                setRecipes(updated);
                if (selectedRecipe && selectedRecipe.id === editingId) setSelectedRecipe(recipeData); // 수정 즉시 반영
                saveData(updated, categories);
                setIsFormOpen(false);
            };

            const deleteRecipe = (id, e) => {
                e.stopPropagation();
                const updated = recipes.filter(r => r.id !== id);
                setRecipes(updated);
                saveData(updated, categories);
                if (selectedRecipe?.id === id) setSelectedRecipe(null);
            };

            const addCategory = () => {
                if (newCatName && !categories.includes(newCatName)) {
                    const updated = [...categories, newCatName];
                    setCategories(updated);
                    saveData(recipes, updated);
                    setNewCatName("");
                }
            };

            const deleteCategory = (cat) => {
                const updated = categories.filter(c => c !== cat);
                setCategories(updated);
                saveData(recipes, updated);
            };

            const onDragStart = (i) => setDraggedItemIndex(i);
            const onDrop = (i) => {
                if (draggedItemIndex === null || draggedItemIndex === i) return;
                const updated = [...categories];
                const item = updated.splice(draggedItemIndex, 1)[0];
                updated.splice(i, 0, item);
                setCategories(updated);
                saveData(recipes, updated);
                setDraggedItemIndex(null);
            };

            // 재료들을 예쁜 칩 형태로 렌더링
            const renderChips = (text, colorClass) => {
                if (!text || text.trim() === "") return <p className="text-[11px] text-slate-300 italic">비어있음</p>;
                const items = text.split(/[\n,]/).filter(i => i.trim());
                return (
                    <div className="flex flex-wrap gap-1 mt-1">
                        {items.map((item, idx) => (
                            <span key={idx} className={`px-1.5 py-0.5 rounded text-[10px] font-medium border shadow-sm ${colorClass}`}>
                                {item.trim()}
                            </span>
                        ))}
                    </div>
                );
            };

            if (isLoading) return <div className="min-h-screen flex flex-col items-center justify-center"><div className="spinner mb-4"></div><div className="font-bold text-slate-400">데이터 연결 중...</div></div>;

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-20 shadow-sm">
                        <div className="max-w-[1400px] mx-auto px-4 py-3 flex justify-between items-center w-full">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => {setView('main'); setSelectedAiRecipe(null); setAiRecommendations([]);}}>
                                <Icon name="utensils" className="text-orange-500 w-6 h-6" />
                                <h1 className="text-xl font-black text-slate-900 hidden sm:block tracking-tight">나만의 레시피 노트</h1>
                            </div>
                            <div className="flex items-center gap-2">
                                <button onClick={handleOpenAdd} className="p-2 text-orange-500 hover:bg-orange-50 rounded-lg transition-all active:scale-90"><Icon name="plus" /></button>
                                <button onClick={() => setIsSettingsOpen(true)} className="p-2 text-slate-500 hover:bg-slate-100 rounded-lg transition-all active:scale-90"><Icon name="settings" /></button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-[1400px] mx-auto px-4 py-6 w-full flex-grow flex flex-col lg:flex-row gap-6">
                        {/* 레시피 영역 */}
                        <div className="flex-grow order-2 lg:order-1">
                            {view === 'main' ? (
                                <>
                                    <div className="flex gap-3 mb-6 items-center">
                                        <div className="relative flex-[7]">
                                            <div className="absolute left-3 top-1/2 -translate-y-1/2 flex items-center"><Icon name="search" className="text-slate-400 w-4 h-4" /></div>
                                            <input type="text" placeholder="제목이나 재료 검색..." className="w-full pl-10 pr-4 py-2.5 bg-white rounded-xl border border-slate-200 outline-none text-sm shadow-sm focus:ring-2 focus:ring-orange-200 transition-all" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                                        </div>
                                        <button onClick={() => setView('ai')} className="flex-[1] flex items-center justify-center gap-2 bg-slate-900 text-white px-2 py-2.5 rounded-xl text-xs font-bold min-w-[100px] shadow-lg active:scale-95 transition-all"><Icon name="sparkles" className="w-3.5 h-3.5 text-orange-400" /> 레시피 추천</button>
                                    </div>
                                    <div className="flex flex-wrap gap-2 mb-6">
                                        <button onClick={() => setActiveCategory("전체")} className={`px-4 py-1.5 rounded-full text-xs font-bold transition-all ${activeCategory === "전체" ? "bg-slate-800 text-white shadow-md" : "bg-white text-slate-500 border border-slate-200"}`}>전체</button>
                                        {categories.map(cat => <button key={cat} onClick={() => setActiveCategory(cat)} className={`px-4 py-1.5 rounded-full text-xs font-bold transition-all ${activeCategory === cat ? "bg-orange-500 text-white shadow-md" : "bg-white text-slate-500 border border-slate-200"}`}>{cat}</button>)}
                                    </div>
                                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-3 xl:grid-cols-4 gap-3">
                                        {filteredRecipes.map(r => (
                                            <div key={r.id} onClick={() => setSelectedRecipe(r)} className="bg-white rounded-xl border border-slate-200 p-3 hover:border-orange-300 hover:shadow-lg cursor-pointer group relative transition-all flex flex-col justify-start h-[105px]">
                                                <div className="flex-grow">
                                                    {/* 상단 라인: 0.8px 미세 이동 적용 */}
                                                    <div className="flex justify-between items-center mb-0.5" style={{ transform: 'translateY(-0.8px)' }}>
                                                        <span className="text-[9px] font-bold text-orange-600 bg-orange-50 px-1.5 py-0.5 rounded truncate max-w-[70%] tracking-tighter">{r.category}</span>
                                                        <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity"><button onClick={(e) => handleOpenEdit(r, e)} className="p-0.5 text-slate-400 hover:text-blue-500"><Icon name="edit-2" className="w-3 h-3" /></button><button onClick={(e) => deleteRecipe(r.id, e)} className="p-0.5 text-slate-400 hover:text-red-500"><Icon name="trash-2" className="w-3 h-3" /></button></div>
                                                    </div>
                                                    <h3 className="font-bold text-slate-900 leading-tight truncate text-sm mb-0.5">{r.title}</h3>
                                                </div>
                                                <p className="text-[11px] text-slate-400 font-medium truncate w-full pt-[1px] border-t border-slate-50">{r.ingredients && r.ingredients.join(', ')}</p>
                                            </div>
                                        ))}
                                    </div>
                                </>
                            ) : (
                                <div className="space-y-6 animate-in slide-in-from-bottom-4">
                                    <div className="flex items-center gap-4"><button onClick={() => { if(selectedAiRecipe) setSelectedAiRecipe(null); else setView('main'); }} className="p-2 hover:bg-slate-200 rounded-full transition-colors"><Icon name="arrow-left" className="text-slate-600 w-6 h-6" /></button><h2 className="text-2xl font-black text-slate-900 tracking-tight">{selectedAiRecipe ? selectedAiRecipe.title : "AI 레시피 제안"}</h2></div>
                                    {!selectedAiRecipe ? (
                                        <div className="bg-white rounded-3xl border border-slate-200 p-8 shadow-sm">
                                            <div className="flex justify-between items-center mb-3"><p className="text-sm font-bold text-slate-500">가진 재료로 어떤 요리를 할까요?</p><button onClick={loadFridgeToAi} className="text-[11px] font-black text-orange-500 bg-orange-50 px-3 py-1.5 rounded-full hover:bg-orange-100 flex items-center gap-1.5 shadow-sm active:scale-95 transition-all"><Icon name="container" className="w-3 h-3" /> 내 냉장고 재료 불러오기</button></div>
                                            <div className="flex flex-col sm:flex-row gap-4">
                                                <textarea className="flex-grow bg-slate-50 border border-slate-200 rounded-2xl p-5 text-sm outline-none resize-none h-32 focus:border-orange-400 transition-all shadow-inner" placeholder="재료를 입력하거나 불러오세요." value={aiInput} onChange={(e) => setAiInput(e.target.value)} />
                                                <button onClick={askAiRecipe} disabled={isAiLoading || !aiInput.trim()} className="bg-orange-500 text-white sm:w-28 rounded-2xl flex flex-col items-center justify-center p-5 shadow-lg active:scale-95 transition-all">{isAiLoading ? <div className="spinner border-white/30 border-t-white !w-8 !h-8"></div> : <Icon name="sparkles" className="w-8 h-8" />}<span className="text-xs font-bold mt-2">레시피 추천</span></button>
                                            </div>
                                            <div className="grid grid-cols-1 gap-4 mt-6">{aiRecommendations.map((rec, idx) => (<div key={idx} onClick={() => setSelectedAiRecipe(rec)} className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:border-orange-500 cursor-pointer flex justify-between items-center group transition-all"><div><h4 className="text-xl font-black text-slate-800 group-hover:text-orange-600 transition-colors">{rec.title}</h4><p className="text-sm text-slate-400 mt-1">{rec.ingredients.slice(0,3).join(', ')} 등</p></div><Icon name="chevron-right" className="text-slate-300 group-hover:text-orange-500 transition-transform group-hover:translate-x-1" /></div>))}</div>
                                        </div>
                                    ) : (
                                        <div className="bg-white rounded-3xl border border-slate-100 p-8 shadow-xl animate-in fade-in">
                                            <div className="mb-8"><h4 className="font-bold text-sm mb-3 border-l-4 border-orange-500 pl-3">주재료</h4><div className="flex flex-wrap gap-2">{selectedAiRecipe.ingredients.map((ing, i) => <span key={i} className="px-3 py-1.5 bg-slate-100 text-slate-600 text-xs rounded-xl font-medium">{ing}</span>)}</div></div>
                                            <div className="mb-8"><h4 className="font-bold text-sm mb-3 border-l-4 border-orange-500 pl-3">소스 및 양념</h4><div className="flex flex-wrap gap-2">{selectedAiRecipe.sauce.map((s, i) => <span key={i} className="px-3 py-1.5 bg-slate-100 text-slate-600 text-xs rounded-xl font-medium">{s}</span>)}</div></div>
                                            <div className="space-y-4">{selectedAiRecipe.steps.map((s, i) => (<div key={i} className="flex gap-4 items-center"><span className="flex-shrink-0 w-6 h-6 rounded-full bg-orange-500 text-white flex items-center justify-center text-[11px] font-black shadow-sm">{i+1}</span><p className="text-slate-600 text-sm leading-relaxed font-medium">{s}</p></div>))}</div>
                                            <div className="mt-10 pt-6 border-t flex justify-end"><button onClick={() => { const newRec = { id: Date.now(), title: selectedAiRecipe.title, category: categories[0] || "기타 한식", ingredients: selectedAiRecipe.ingredients, sauce: selectedAiRecipe.sauce, steps: selectedAiRecipe.steps }; setRecipes([...recipes, newRec]); saveData([...recipes, newRec], categories); setView('main'); setSelectedAiRecipe(null); }} className="bg-slate-900 text-white px-6 py-3 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-slate-800 transition-all shadow-lg active:scale-95"><Icon name="save" className="w-4 h-4" /> 이 레시피 저장하기</button></div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>

                        {/* 사이드바: 냉장고 & 장보기 */}
                        <aside className="w-full lg:w-72 flex-shrink-0 space-y-6 order-1 lg:order-2">
                            {/* 내 냉장고 카드 */}
                            <div className="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
                                <div className="bg-slate-50 px-4 py-3 border-b border-slate-100 flex justify-between items-center">
                                    <h2 className="font-black text-slate-900 text-sm flex items-center gap-1.5"><Icon name="container" className="text-orange-500 w-4 h-4" /> 내 냉장고</h2>
                                    <button onClick={() => saveFridgeAndMemo()} disabled={isFridgeSaving} className="text-[10px] font-bold bg-orange-500 text-white px-2.5 py-1 rounded-md active:scale-95 transition-all shadow-sm">전체저장</button>
                                </div>
                                <div className="p-4 space-y-5">
                                    {[
                                        { key: 'refrigerated', label: '냉장', color: 'bg-orange-50 border-orange-100 text-orange-700', labelColor: 'text-slate-400' },
                                        { key: 'frozen', label: '냉동', color: 'bg-blue-50 border-blue-100 text-blue-700', labelColor: 'text-blue-500' },
                                        { key: 'roomTemp', label: '실온', color: 'bg-amber-50 border-amber-100 text-amber-700', labelColor: 'text-amber-500' },
                                        { key: 'sauce', label: '소스 및 조미료', color: 'bg-emerald-50 border-emerald-100 text-emerald-700', labelColor: 'text-emerald-500' }
                                    ].map((sec) => (
                                        <div key={sec.key}>
                                            <div className="flex justify-between items-center mb-1.5">
                                                <label className={`text-[10px] font-black uppercase ${sec.labelColor}`}>{sec.label}</label>
                                                {editingSection === sec.key && <span className="text-[9px] text-slate-300 font-bold animate-pulse">편집 중...</span>}
                                            </div>
                                            {editingSection === sec.key ? (
                                                <textarea 
                                                    autoFocus 
                                                    className="w-full text-[12px] bg-white border border-orange-200 rounded-lg p-2 resize-none h-24 shadow-inner" 
                                                    value={fridgeData[sec.key]} 
                                                    onChange={e => setFridgeData({...fridgeData, [sec.key]: e.target.value})} 
                                                    onBlur={() => setEditingSection(null)} 
                                                />
                                            ) : (
                                                <div onClick={() => setEditingSection(sec.key)} className="min-h-[30px] cursor-pointer hover:bg-slate-50 transition-all rounded-md p-0.5">
                                                    {renderChips(fridgeData[sec.key], sec.color)}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* 장보기 메모 카드 (v4.1 신기능) */}
                            <div className="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
                                <div className="bg-slate-50 px-4 py-3 border-b border-slate-100 flex justify-between items-center">
                                    <h2 className="font-black text-slate-900 text-sm flex items-center gap-1.5"><Icon name="shopping-cart" className="text-blue-500 w-4 h-4" /> 장보기 메모</h2>
                                    {isFridgeSaving && editingSection === 'shoppingMemo' && <div className="w-3 h-3 border-2 border-blue-200 border-t-blue-500 rounded-full animate-spin"></div>}
                                </div>
                                <div className="p-4">
                                    {editingSection === 'shoppingMemo' ? (
                                        <textarea 
                                            autoFocus 
                                            className="w-full text-[12px] bg-white border border-blue-200 rounded-lg p-3 resize-none h-32 shadow-inner leading-relaxed"
                                            value={fridgeData.shoppingMemo}
                                            onChange={e => setFridgeData({...fridgeData, shoppingMemo: e.target.value})}
                                            onBlur={() => { setEditingSection(null); saveFridgeAndMemo(); }}
                                            placeholder="구매할 재료를 적어주세요..."
                                        />
                                    ) : (
                                        <div onClick={() => setEditingSection('shoppingMemo')} className="min-h-[60px] cursor-pointer hover:bg-slate-50 transition-all rounded-md group relative p-1">
                                            {renderChips(fridgeData.shoppingMemo, "bg-blue-50 border-blue-100 text-blue-700")}
                                            <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
                                                <span className="bg-white/90 px-2 py-1 rounded text-[10px] font-bold text-blue-500 shadow-sm border border-blue-100">클릭하여 편집</span>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </aside>
                    </main>

                    {/* 레시피 상세 보기 모달 */}
                    {selectedRecipe && (
                        <div className="fixed inset-0 z-40 flex items-center justify-center p-4 modal-overlay" onClick={() => setSelectedRecipe(null)}>
                            <div className="bg-white w-full max-w-lg rounded-[2rem] shadow-2xl overflow-hidden max-h-[85vh] flex flex-col" onClick={e => e.stopPropagation()}>
                                <div className="p-5 border-b flex justify-between items-center bg-slate-50/50">
                                    <span className="text-xs font-bold text-orange-600 bg-orange-100 px-3 py-1 rounded-full">{selectedRecipe.category}</span>
                                    <div className="flex gap-2">
                                        <button onClick={(e) => handleOpenEdit(selectedRecipe, e)} className="p-2 hover:bg-white rounded-xl transition-all shadow-sm"><Icon name="edit-2" className="text-slate-500 w-4 h-4" /></button>
                                        <button onClick={() => setSelectedRecipe(null)} className="p-2 hover:bg-white rounded-xl transition-all shadow-sm"><Icon name="x" className="text-slate-500 w-4 h-4" /></button>
                                    </div>
                                </div>
                                <div className="p-8 overflow-y-auto hide-scrollbar">
                                    <h2 className="text-3xl font-black mb-6 text-slate-900 tracking-tight">{selectedRecipe.title}</h2>
                                    <div className="mb-8">
                                        <h4 className="font-bold text-sm mb-3 border-l-4 border-orange-500 pl-3 text-slate-800 uppercase">필요 재료</h4>
                                        <div className="flex flex-wrap gap-2">
                                            {selectedRecipe.ingredients.map((ing, i) => <span key={i} className="px-3 py-1.5 bg-slate-100 text-slate-600 text-xs rounded-xl font-medium">{ing}</span>)}
                                        </div>
                                    </div>
                                    {selectedRecipe.sauce && selectedRecipe.sauce.length > 0 && (
                                        <div className="mb-8">
                                            <h4 className="font-bold text-sm mb-3 border-l-4 border-orange-500 pl-3 text-slate-800 uppercase">소스 및 양념</h4>
                                            <div className="flex flex-wrap gap-2">
                                                {selectedRecipe.sauce.map((s, i) => <span key={i} className="px-3 py-1.5 bg-slate-100 text-slate-600 text-xs rounded-xl font-medium">{s}</span>)}
                                            </div>
                                        </div>
                                    )}
                                    <div>
                                        <h4 className="font-bold text-sm mb-3 border-l-4 border-orange-500 pl-3 text-slate-800 uppercase">조리 순서</h4>
                                        <div className="space-y-5">
                                            {selectedRecipe.steps.map((s, i) => (
                                                <div key={i} className="flex gap-4 items-center">
                                                    <span className="flex-shrink-0 w-6 h-6 rounded-full bg-orange-500 text-white flex items-center justify-center text-[11px] font-black shadow-sm transition-transform">{i+1}</span>
                                                    <p className="text-slate-600 text-sm leading-relaxed font-medium">{s}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 추가/수정 모달 */}
                    {isFormOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay">
                            <div className="bg-white w-full max-w-md rounded-[2rem] p-8 shadow-2xl overflow-y-auto max-h-[90vh] animate-in zoom-in-95">
                                <h2 className="text-2xl font-black mb-6 text-slate-900 tracking-tight">{editingId ? "레시피 수정" : "새 레시피 추가"}</h2>
                                <form onSubmit={handleSubmit} className="space-y-4 text-sm font-medium">
                                    <div><label className="block text-[10px] uppercase text-slate-400 font-black mb-1.5 ml-1">요리 제목</label><input required className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-orange-500 focus:bg-white transition-all shadow-inner" placeholder="요리 제목" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} /></div>
                                    <div><label className="block text-[10px] uppercase text-slate-400 font-black mb-1.5 ml-1">카테고리</label><div className="relative"><select className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-orange-500 appearance-none shadow-inner" value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})} required><option value="" disabled>카테고리 선택</option>{categories.map(cat => (<option key={cat} value={cat}>{cat}</option>))}</select><div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400"><Icon name="chevron-down" className="w-4 h-4" /></div></div></div>
                                    <div><label className="block text-[10px] uppercase text-slate-400 font-black mb-1.5 ml-1 text-slate-700">주재료</label><textarea rows="2" className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none resize-none shadow-inner" placeholder="주재료" value={formData.ingredients} onChange={e => setFormData({...formData, ingredients: e.target.value})} /></div>
                                    <div><label className="block text-[10px] uppercase text-slate-400 font-black mb-1.5 ml-1 text-slate-700">소스 및 양념</label><textarea rows="2" className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none resize-none shadow-inner" placeholder="소스 및 양념" value={formData.sauce} onChange={e => setFormData({...formData, sauce: e.target.value})} /></div>
                                    <div><label className="block text-[10px] uppercase text-slate-400 font-black mb-1.5 ml-1">조리 순서</label><textarea rows="4" className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none resize-none shadow-inner" placeholder="조리 순서" value={formData.steps} onChange={e => setFormData({...formData, steps: e.target.value})} /></div>
                                    <div className="flex gap-3 pt-4"><button type="button" onClick={() => setIsFormOpen(false)} className="flex-1 py-3.5 text-slate-400 font-bold active:scale-95 transition-all">취소</button><button type="submit" className="flex-[2] bg-orange-500 text-white px-8 py-3.5 rounded-2xl font-black shadow-lg hover:bg-orange-600 transition-all active:scale-95">저장하기</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* 카테고리 관리 모달 */}
                    {isSettingsOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay">
                            <div className="bg-white w-full max-w-sm rounded-[2rem] p-8 shadow-2xl animate-in fade-in duration-300">
                                <div className="flex justify-between items-center mb-6"><h2 className="text-xl font-black text-slate-800 tracking-tight">카테고리 관리</h2><button onClick={() => setIsSettingsOpen(false)} className="p-2 hover:bg-slate-100 rounded-xl transition-all"><Icon name="x" className="text-slate-400" /></button></div>
                                <div className="space-y-2 mb-6 max-h-64 overflow-y-auto pr-1 hide-scrollbar">{categories.map((cat, i) => (<div key={cat} draggable onDragStart={() => onDragStart(i)} onDragOver={e => e.preventDefault()} onDrop={() => onDrop(i)} className={`flex justify-between items-center p-3.5 bg-slate-50 rounded-2xl text-sm border-2 transition-all ${draggedItemIndex === i ? "drag-over" : "border-transparent"}`}><div className="flex items-center gap-3"><Icon name="grip-vertical" className="text-slate-300 cursor-grab" /><span className="font-bold text-slate-700">{cat}</span></div><button onClick={() => deleteCategory(cat)} className="p-1.5 text-slate-300 hover:text-red-500 transition-colors"><Icon name="trash-2" /></button></div>))}</div>
                                <div className="flex gap-2 border-t pt-6"><input type="text" className="flex-1 px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-orange-500 transition-all shadow-inner" placeholder="새 카테고리" value={newCatName} onChange={e => setNewCatName(e.target.value)} onKeyPress={e => e.key === 'Enter' && addCategory()} /><button onClick={addCategory} className="p-2.5 bg-orange-500 rounded-xl text-white shadow-md active:scale-95 transition-all"><Icon name="check" /></button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
